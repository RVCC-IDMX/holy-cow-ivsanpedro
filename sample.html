<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Cowsay</title>
    <script src="build/cowsay.umd.js"></script>
  </head>
  <body>
    <pre id="output"></pre>
    <script>
      /// Helper function to decode Unicode escape sequences in the input string
      function decodeUnicodeEscapes(str) {
        return str.replace(/\\u\{([0-9a-fA-F]+)\}/g, (_, code) =>
          String.fromCodePoint(parseInt(code, 16))
        );
      }
      const output = document.getElementById('output');
      output.textContent = cowsay.say({
        text: decodeUnicodeEscapes('grazing in the browser\\u{1F409}'),
        cow: cowsay.DRAGON,
      });
    </script>
  </body>
</html>
